name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install tox
        run: pip install tox

      - name: Lint
        run: tox -e lint

  macos-contract:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          submodules: recursive

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install system dependencies
        run: brew install ninja zlib

      - name: Install tox
        run: pip install tox

      - name: Run macOS non-regression contract matrix
        run: tox -e py314-native -- -m "not regression"

  windows-contract:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          submodules: recursive

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install system dependencies
        run: |
          pip install ninja
          vcpkg install zlib:x64-windows

      - name: Add vcpkg runtime DLLs to PATH
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) {
            $vcpkgRoot = Split-Path -Parent (Get-Command vcpkg).Source
          }
          $dllDir = Join-Path $vcpkgRoot "installed\x64-windows\bin"
          if (-not (Test-Path $dllDir)) {
            throw "missing vcpkg DLL directory: $dllDir"
          }
          Add-Content -Path $env:GITHUB_PATH -Value $dllDir

      - name: Install tox
        run: pip install tox

      - name: Run Windows non-regression contract matrix
        run: tox -e py314-native -- -m "not regression"

  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.13"
            tox-env: py313
          - python-version: "3.14"
            tox-env: py314
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          submodules: recursive

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build zlib1g-dev

      - name: Install tox
        run: pip install tox

      - name: Run tests
        run: tox -e ${{ matrix.tox-env }}
