name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install tox
        run: pip install tox

      - name: Lint
        run: tox -e lint

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build zlib1g-dev

      - name: Build wheel
        run: |
          pip install build
          python -m build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: flatline-wheel
          path: dist/*.whl

  macos-contract:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install system dependencies
        run: brew install ninja zlib

      - name: Install tox
        run: pip install tox

      - name: Run macOS non-regression contract matrix
        run: tox -e py314-native -- -m "not regression"

  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.13"
            tox-env: py313
          - python-version: "3.14"
            tox-env: py314
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build zlib1g-dev

      - name: Install tox
        run: pip install tox

      - name: Run non-regression tests
        run: tox -e ${{ matrix.tox-env }} -- -m "not regression"

  regression:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build zlib1g-dev

      - name: Install tox
        run: pip install tox

      - name: Run regression gates
        run: tox -e py314 -- -m regression
