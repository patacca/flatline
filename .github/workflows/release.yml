name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dev-checks:
    name: Dev validation (compliance, footprint, workflow spec, artifact audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install tox
        run: pip install tox

      - name: Run dev checks
        run: tox -e dev

  build-wheels:
    name: Build wheels (${{ matrix.os }}, ${{ matrix.cibw-archs }})
    runs-on: ${{ matrix.os }}
    needs: dev-checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cibw-archs: x86_64
          - os: ubuntu-24.04-arm
            cibw-archs: aarch64
          - os: windows-latest
            cibw-archs: AMD64
          - os: macos-15
            cibw-archs: arm64
          - os: macos-15-intel
            cibw-archs: x86_64
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Windows zlib dependencies
        if: runner.os == 'Windows'
        run: vcpkg install zlib:x64-windows

      - name: Build wheels via cibuildwheel
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_ARCHS: ${{ matrix.cibw-archs }}

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-wheels-${{ matrix.os }}-${{ matrix.cibw-archs }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    needs: dev-checks
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install build tooling
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist --outdir dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  validate:
    name: Validate distribution artifacts
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    env:
      PYTHONPATH: src:tools
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install validation tooling
        run: pip install twine

      - name: Download all distribution artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Validate distribution artifacts
        run: |
          twine check dist/*
          python tools/artifacts.py dist --repo-root .

      - name: Upload validated distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to ${{ github.event_name == 'workflow_dispatch' && 'TestPyPI' || 'PyPI' }}
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      id-token: write
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && 'testpypi' || 'pypi' }}
      url: ${{ github.event_name == 'workflow_dispatch' && 'https://test.pypi.org/project/flatline/' || 'https://pypi.org/project/flatline/' }}
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish distribution artifacts
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          repository-url: ${{ github.event_name == 'workflow_dispatch' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}

  smoke-published:
    name: Smoke published wheels (${{ matrix.os }}, py${{ matrix.python-version }}, ${{ matrix.cibw-archs }})
    runs-on: ${{ matrix.os }}
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cibw-archs: x86_64
            python-version: "3.13"
          - os: ubuntu-latest
            cibw-archs: x86_64
            python-version: "3.14"
          - os: ubuntu-24.04-arm
            cibw-archs: aarch64
            python-version: "3.13"
          - os: ubuntu-24.04-arm
            cibw-archs: aarch64
            python-version: "3.14"
          - os: windows-latest
            cibw-archs: AMD64
            python-version: "3.13"
          - os: windows-latest
            cibw-archs: AMD64
            python-version: "3.14"
          - os: macos-15
            cibw-archs: arm64
            python-version: "3.13"
          - os: macos-15
            cibw-archs: arm64
            python-version: "3.14"
          - os: macos-15-intel
            cibw-archs: x86_64
            python-version: "3.13"
          - os: macos-15-intel
            cibw-archs: x86_64
            python-version: "3.14"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Smoke published wheel install
        run: python tools/flatline_dev/published_wheel_smoke.py --repository ${{ github.event_name == 'workflow_dispatch' && 'testpypi' || 'pypi' }}
